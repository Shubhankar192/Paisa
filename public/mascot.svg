<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- Paisa mascot: "Sprout" — a coin that grows -->
  <defs>
    <linearGradient id="mbody" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#0BA765"/>
      <stop offset="1" stop-color="#05603A"/>
    </linearGradient>
    <linearGradient id="mleaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#32D583"/>
      <stop offset="1" stop-color="#079455"/>
    </linearGradient>
  </defs>
  <ellipse cx="120" cy="216" rx="60" ry="9" fill="#101828" opacity="0.08"/>
  <ellipse cx="100" cy="206" rx="14" ry="8" fill="#054F31"/>
  <ellipse cx="140" cy="206" rx="14" ry="8" fill="#054F31"/>
  <circle cx="40" cy="144" r="12" fill="#05603A"/>
  <circle cx="201" cy="112" r="12" fill="#05603A"/>
  <circle cx="120" cy="128" r="82" fill="url(#mbody)"/>
  <circle cx="120" cy="128" r="70" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="3" stroke-dasharray="1 8" stroke-linecap="round"/>
  <path d="M120 48 C120 36 120 30 120 22" stroke="#05603A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M120 26 C106 26 97 17 96 6 C108 6 118 13 120 26 Z" fill="url(#mleaf)"/>
  <path d="M120 30 C134 30 143 21 144 9 C131 9 122 17 120 30 Z" fill="url(#mleaf)"/>
  <!-- big cute eyes, set closer together -->
  <circle cx="99" cy="108" r="13" fill="#ffffff"/>
  <circle cx="141" cy="108" r="13" fill="#ffffff"/>
  <circle cx="102" cy="110" r="6.5" fill="#101828"/>
  <circle cx="138" cy="110" r="6.5" fill="#101828"/>
  <circle cx="104.4" cy="107" r="2.4" fill="#ffffff"/>
  <circle cx="140.4" cy="107" r="2.4" fill="#ffffff"/>
  <circle cx="100.5" cy="112.5" r="1.1" fill="#ffffff"/>
  <circle cx="136.5" cy="112.5" r="1.1" fill="#ffffff"/>
  <!-- mint blush under the eyes -->
  <ellipse cx="83" cy="126" rx="8" ry="5" fill="#7BE0AE" opacity="0.55"/>
  <ellipse cx="157" cy="126" rx="8" ry="5" fill="#7BE0AE" opacity="0.55"/>
  <!-- small happy open smile -->
  <path d="M106 128 Q120 147 134 128 Q120 137 106 128 Z" fill="#0B2E20"/>
  <!-- ₹ watermark: large, subtle, embossed into the coin body -->
  <clipPath id="mclip"><circle cx="120" cy="128" r="82"/></clipPath>
  <g clip-path="url(#mclip)">
    <text x="120" y="172" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700"
      fill="#ffffff" fill-opacity="0.17" text-anchor="middle" dominant-baseline="central">&#8377;</text>
  </g>
</svg>
